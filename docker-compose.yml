services:
  postgres:
    image: postgres:16
    container_name: digital-bank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: digital_bank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - digital_bank_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d digital_bank"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  digital_bank_data: